[platformio]
src_dir = src
extra_configs = platformio.local.ini

[env:esp12e]
platform = espressif8266
board = esp12e
framework = esp8266-rtos-sdk
monitor_speed = 74880

lib_deps =
  symlink://../..

build_flags =
  -D WIFI_SSID=\"your-ssid\"
  -D WIFI_PASSWORD=\"your-password\"
  -D TCP_ECHO_PORT=7777
